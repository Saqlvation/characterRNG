<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal RNG </title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            font-family:fantasy;
            margin-top: 40px;
        }

        #playBtn{
            padding: 20px 50px;
            font-size: 20px;
            cursor: pointer;
            border-radius: 6px;

        }

        #playBtn:hover{
            padding: 18px 45px; /* when hover it gets smaller */
            background-color: aqua;
        }

        /* i make all the images the same size and style the image*/
        #animalImage {
            width: 300px;
            height: 400px;
            border: 3px solid;
        }
    </style>
</head>
<body>
<div id="start">
<h1> Animal RNG</h1>
</div>
<button id="playBtn">Roll</button>



<div id = "animalFound" style="display:none">
    <h2 id="animalText"> placeholder </h1>
    <h2 id="animalRarity">placehlder</h2>
    <p id="animalDescription"></p>
    <img id="animalImage" src="" alt="image">
</div>




<script src="script.js"></script> <!-- we link the js file to the html -->


</body>
</html>
