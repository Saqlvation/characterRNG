<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character RNG </title>
    <link rel="icon" type="image/png" href="assets/icon.png"> <!-- we add a icon to the browser tab -->
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            font-family:Verdana, Geneva, Tahoma, sans-serif;
            margin-top: 40px;
            
            }

        #playBtn{
            padding: 20px 50px;
            font-size: 20px;
            cursor: pointer;
            border-radius: 6px;

        }



        #playBtn:hover{
            padding: 18px 45px; /* when hover it gets smaller */
            background-color: aqua;
        }

        /* i make all the images the same size and style the image*/
        #characterImage {
            width: 300px;
            height: 400px;
            border: 3px solid;
        }
/* we place the button on the top left */
        #changeScenario{
            position: fixed;
            top:20px;
            left: 35px;
            padding: 15px 40px;
            font-size: 15px;
            cursor: pointer;
        }
        #changeScenario:hover {
            padding: 13px 39px; /* when hover it gets smaller */
            background-color: aqua;
        }

        #latestRolls {
            position:fixed;
            top:80px;
            left: 20px;
            border-radius: 4px;
            font-size: small;
            border: 1px solid;

        } 
        /* when its disabled we make it so it looks like it is*/
        #playBtn:disabled{
            cursor: not-allowed; /* this displays the not allowed sign once you hover a disabled button */

            

        }
        /* FIXES FOR MOBILE */
        @media (max-width: 600px){
            #latestRolls {
                position:static;
                width: 90%;
                margin: 20px auto;
                top: auto;
                left: auto;
            }
        }
    </style>
</head>
<body>
<div id="start">
<h1> Character RNG</h1>
</div>
<button id="playBtn">Roll</button>
<button id="changeScenario">Animals</button>




<div id = "characterFound" style="display:none">
    <h2 id="characterText"> placeholder </h2>
    <h2 id="characterRarity">placehlder</h2>
    <p id="characterDescription"></p>
    <img id="characterImage" src="" alt="image">
</div>
<div id="differentScenario" style="display:none">



</div>

<div id="latestRolls">
<p>Here are your latest rolls:</p>
<p id="textRolls"></p>

</div>


<script src="animals.js"></script><!-- This contains ALL the animals-->
<script src="anime.js"></script><!-- This contains ALL the animals-->
<script src="scenarios.js"></script><!-- This contains ALL the scenarios-->
<script src="script.js"></script> <!-- we link the js file to the html -->


</body>
</html>
